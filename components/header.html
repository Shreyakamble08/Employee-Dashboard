<header class="header" id="header">
    <div class="header-left">
        <button class="mobile-toggle" id="mobileToggleBtn">
            <i class="fas fa-bars"></i>
        </button>
        <div class="page-title" id="pageTitle">Dashboard</div>
    </div>

    <div class="header-right">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search..." id="globalSearch">
        </div>

        <div class="notification-bell">
            <button class="icon-btn" id="notificationBtn">
                <i class="far fa-bell"></i>
                <span class="notification-badge">3</span>
            </button>
        </div>

        <div class="user-profile">
            <button class="profile-btn" id="profileDropdownBtn">
                <div class="avatar" id="userAvatarInitials">JD</div>
                <div class="user-info">
                    <span class="user-name" id="userName">John Doe</span>
                    <span class="user-role" id="userRole">Employee</span>
                </div>
                <i class="fas fa-chevron-down"></i>
            </button>
            
            <div class="profile-dropdown" id="profileDropdown">
                <a href="profile.html" class="dropdown-item">
                    <i class="fas fa-user-circle"></i> My Profile
                </a>
                <a href="#" class="dropdown-item">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item logout-item">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>
</header>
