<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Employee Portal | Secure Login</title>
  <!-- Google Fonts: Inter & Poppins -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Toastify CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      position: relative;
      background: #EEF3F8;
      overflow: hidden;
    }

    /* refined professional grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(31, 111, 127, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 111, 127, 0.08) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    /* soft gradient depth layer */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(95, 175, 194, 0.10), transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(31, 111, 127, 0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.22;
      z-index: 0;
      pointer-events: none;
      animation: floatOrbs 14s ease-in-out infinite alternate;
    }

    /* soft teal blue */
    .orb.one {
      width: 240px;
      height: 240px;
      background: #5FAFC2;
      top: 8%;
      left: 6%;
    }

    /* deep navy blue */
    .orb.two {
      width: 280px;
      height: 280px;
      background: #1F6F7F;
      bottom: 8%;
      right: 10%;
    }

    /* light sky blue accent */
    .orb.three {
      width: 200px;
      height: 200px;
      background: #93C5FD;
      top: 55%;
      left: 45%;
    }

    @keyframes floatOrbs {
      0% {
        transform: translateY(0px) scale(1);
      }

      100% {
        transform: translateY(-18px) scale(1.05);
      }
    }

    /* main container */
    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      background: #FFFFFF;
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -10px rgba(15, 23, 42, 0.12), 0 1px 3px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .login-container:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px -12px rgba(15, 23, 42, 0.2);
    }

    /* header section */
    .brand-header {
      background: linear-gradient(135deg, #1F6F7F 0%, #145C6B 100%);
      padding: 1.2rem 1.2rem 1rem 1.2rem;
      text-align: center;
      position: relative;
    }

    .brand-header .logo-circle {
      background: rgba(255, 255, 255, 0.12);
      width: 52px;
      height: 52px;
      margin: 0 auto 0.7rem auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.2s;
    }

    .brand-header .logo-circle:hover {
      transform: scale(1.05);
    }

    .brand-header .logo-circle i {
      font-size: 1.8rem;
      color: #FFFFFF;
    }

    .brand-header h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.4rem;
      letter-spacing: -0.3px;
      color: #FFFFFF;
      margin-bottom: 0.2rem;
    }

    .brand-header p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.7rem;
      font-weight: 400;
    }

    /* form body */
    .form-body {
      padding: 1.4rem 1.6rem 1.5rem 1.6rem;
    }

    /* input groups */
    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
      color: #334155;
      letter-spacing: -0.2px;
    }

    .input-group label i {
      color: #5FAFC2;
      font-size: 0.75rem;
      width: 1rem;
    }

    .input-field {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-field i.field-icon {
      position: absolute;
      left: 0.9rem;
      color: #94A3B8;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .input-field input {
      width: 100%;
      padding: 0.65rem 0.9rem 0.65rem 2.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      background: #FFFFFF;
      border: 1.5px solid #E2E8F0;
      border-radius: 1rem;
      outline: none;
      transition: all 0.2s ease;
      color: #0F172A;
    }

    .input-field input:focus {
      border-color: #1F6F7F;
      box-shadow: 0 0 0 3px rgba(31, 111, 127, 0.08);
    }

    .input-field input:hover {
      border-color: #5FAFC2;
    }

    /* password toggle button */
    .password-toggle {
      position: absolute;
      right: 0.9rem;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #94A3B8;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .password-toggle:hover {
      color: #1F6F7F;
    }

    /* options row */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.5rem 0 1.2rem 0;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
    }

    .checkbox-label input {
      accent-color: #1F6F7F;
      width: 0.9rem;
      height: 0.9rem;
      margin: 0;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.75rem;
      font-weight: 500;
      color: #5FAFC2;
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .forgot-link:hover {
      color: #1F6F7F;
      text-decoration: underline;
    }

    /* login button */
    .login-btn {
      width: 100%;
      background: linear-gradient(105deg, #1F6F7F 0%, #5FAFC2 100%);
      border: none;
      padding: 0.75rem 1rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 2rem;
      color: #FFFFFF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(31, 111, 127, 0.2);
    }

    .login-btn i {
      font-size: 0.85rem;
      transition: transform 0.2s;
    }

    .login-btn:hover {
      background: linear-gradient(105deg, #145C6B 0%, #4A9BB0 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(31, 111, 127, 0.3);
    }

    .login-btn:hover i {
      transform: translateX(3px);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* divider */
    hr {
      margin: 1rem 0 0.8rem;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, #E2E8F0, #CBD5E1, #E2E8F0);
      opacity: 0.6;
    }

    /* demo note */
    .demo-note {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.7rem;
      color: #64748B;
      background: #F8FAFC;
      padding: 0.65rem;
      border-radius: 1rem;
      border: 1px solid #E2E8F0;
    }

    .demo-note i {
      color: #6FAF2E;
      margin-right: 0.3rem;
    }

    .demo-note span {
      font-weight: 700;
      color: #1F6F7F;
    }

    .demo-note strong {
      color: #6FAF2E;
    }

    @media (max-width: 480px) {
      .login-container {
        max-width: 94%;
      }

      .form-body {
        padding: 1.1rem 1.3rem 1.2rem;
      }

      .brand-header {
        padding: 0.9rem 1rem 0.8rem;
      }

      .brand-header h1 {
        font-size: 1.25rem;
      }

      .brand-header .logo-circle {
        width: 46px;
        height: 46px;
      }

      .brand-header .logo-circle i {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>
  <div class="orb one"></div>
  <div class="orb two"></div>
  <div class="orb three"></div>

  <div class="login-container">
    <div class="brand-header">
      <div class="logo-circle">
        <i class="fas fa-briefcase"></i>
      </div>
      <h1>Employee Portal</h1>
      <p>secure dashboard access</p>
    </div>
    <div class="form-body">
      <form id="employeeLoginForm" action="#" method="POST">
        <!-- Employee ID field -->
        <div class="input-group">
          <label><i class="fas fa-id-card"></i> Employee ID</label>
          <div class="input-field">
            <i class="fas fa-user-circle field-icon"></i>
            <input type="text" id="empId" name="employee_id" placeholder="Enter your Employee ID"
              autocomplete="username" required>
          </div>
        </div>

        <!-- Password field with toggle -->
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-field">
            <i class="fas fa-key field-icon"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password"
              autocomplete="current-password" required>
            <button type="button" class="password-toggle" id="togglePasswordBtn" aria-label="Show password">
              <i class="far fa-eye-slash" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <!-- Options: remember & forgot -->
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberCheck"> <span>Keep me signed in</span>
          </label>
          <a href="#" class="forgot-link" id="forgotMockLink">
            <i class="fas fa-question-circle"></i> Forgot password?
          </a>
        </div>

        <!-- Login button -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span>Access Dashboard</span>
          <i class="fas fa-arrow-right-to-bracket"></i>
        </button>

        <hr>
        <div class="demo-note">
          <i class="fas fa-circle-info"></i> <span>Demo Credentials</span><br>
          ID: <strong>355872</strong> / Password: <strong>dashboard123</strong>
        </div>
      </form>
    </div>
  </div>

  <!-- Toastify JS -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script>
    (function () {
      const form = document.getElementById('employeeLoginForm');
      const empIdInput = document.getElementById('empId');
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('togglePasswordBtn');
      const toggleIcon = document.getElementById('toggleIcon');
      const rememberCheckbox = document.getElementById('rememberCheck');
      const forgotLink = document.getElementById('forgotMockLink');

      // Toast notification function
      function showToast(message, type = 'error') {
        let backgroundColor = type === 'success' ? '#6FAF2E' : (type === 'warning' ? '#F59E0B' : '#E56C6C');
        let icon = type === 'success' ? '✓' : (type === 'warning' ? '⚠' : '✕');

        Toastify({
          text: `${icon} ${message}`,
          duration: 3500,
          gravity: "top",
          position: "right",
          style: {
            background: backgroundColor,
            borderRadius: "12px",
            padding: "10px 18px",
            fontSize: "13px",
            fontWeight: "500",
            fontFamily: "'Inter', sans-serif",
            boxShadow: "0 4px 12px rgba(0,0,0,0.1)"
          },
          offset: {
            x: 15,
            y: 15
          }
        }).showToast();
      }

      // Toggle password visibility
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          if (type === 'text') {
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
          } else {
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
          }
        });
      }

      // Forgot link demo message
      forgotLink.addEventListener('click', (e) => {
        e.preventDefault();
        showToast('Demo ID: 355872 | Password: dashboard123', 'warning');
      });

      // Load saved credentials if "remember me" was active
      function loadRemembered() {
        const savedId = localStorage.getItem('emp_remember_id');
        const savedPwd = localStorage.getItem('emp_remember_pass');
        const savedFlag = localStorage.getItem('emp_remember_flag');
        if (savedFlag === 'true' && savedId) {
          empIdInput.value = savedId;
          if (savedPwd) passwordInput.value = savedPwd;
          rememberCheckbox.checked = true;
        }
      }

      function persistRemember(empId, pwd, remember) {
        if (remember) {
          localStorage.setItem('emp_remember_id', empId);
          localStorage.setItem('emp_remember_pass', pwd);
          localStorage.setItem('emp_remember_flag', 'true');
        } else {
          localStorage.removeItem('emp_remember_id');
          localStorage.removeItem('emp_remember_pass');
          localStorage.setItem('emp_remember_flag', 'false');
        }
      }

      loadRemembered();

      // Handle login - redirect to dashboard
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const employeeId = empIdInput.value.trim();
        const password = passwordInput.value.trim();

        if (employeeId === "") {
          showToast("Please enter Employee ID", "error");
          empIdInput.focus();
          return;
        }
        if (password === "") {
          showToast("Password is required", "error");
          passwordInput.focus();
          return;
        }

        const validEmployeeId = "355872";
        const validPassword = "dashboard123";

        if (employeeId === validEmployeeId && password === validPassword) {
          // Save remember me preference
          if (rememberCheckbox.checked) {
            persistRemember(employeeId, password, true);
          } else {
            persistRemember('', '', false);
          }

          // Store authentication flag and employee data for dashboard
          localStorage.setItem('hrms_auth_token', 'authenticated_' + Date.now());
          localStorage.setItem('hrms_employee_id', employeeId);
          localStorage.setItem('hrms_employee_name', 'Alex Mercer');
          localStorage.setItem('hrms_employee_email', 'alex.mercer@hrms.com');
          localStorage.setItem('hrms_employee_role', 'Senior Developer');

          showToast(`Welcome ${employeeId}! Redirecting to dashboard...`, "success");

          // Disable login button during redirect
          const submitBtn = form.querySelector('.login-btn');
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Redirecting...';

          // Redirect to dashboard after short delay
          setTimeout(() => {
            window.location.href = '/pages/dashboard.html';
          }, 1000);
        } else {
          showToast(`Access denied. Invalid credentials.`, "error");
          passwordInput.value = '';
          passwordInput.focus();
          const btn = form.querySelector('.login-btn');
          if (btn.disabled) btn.disabled = false;
        }
      });

      // Clear any stale auth on login page load
      localStorage.removeItem('hrms_auth_token');
      localStorage.removeItem('hrms_employee_id');
    })();
  </script>
</body>

</html>
