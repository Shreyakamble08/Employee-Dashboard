<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>HRMS | Employee Profile Module</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="../css/profile.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>

<body>
    <div class="dashboard-container">

   <!-- Sidebar -->
<aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <div class="logo">
            <i class="fas fa-briefcase"></i>
            <span class="logo-text">Employee Portal</span>
        </div>

        <button class="collapse-btn" id="collapseSidebarBtn" aria-label="Toggle sidebar">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <!-- IMPORTANT: added sidebar-nav -->
    <nav class="sidebar-nav">
        <ul class="nav-menu">

            <li>
                <a href="#" class="nav-link">
                    <i class="fas fa-chart-pie"></i>
                    <span class="nav-text">Dashboard</span>
                </a>
            </li>

            <li>
                <a href="#" class="nav-link active">
                    <i class="fas fa-user"></i>
                    <span class="nav-text">Profile</span>
                </a>
            </li>

            <li>
                <a href="../pages/attendance.html" class="nav-link">
                    <i class="fas fa-clock"></i>
                    <span class="nav-text">Attendance</span>
                </a>
            </li>

            <li>
                <a href="#" class="nav-link">
                    <i class="fas fa-money-bill"></i>
                    <span class="nav-text">Expenses</span>
                </a>
            </li>

            <li>
                <a href="#" class="nav-link">
                    <i class="fas fa-umbrella-beach"></i>
                    <span class="nav-text">Leave</span>
                </a>
            </li>

            <li>
                <a href="#" class="nav-link">
                    <i class="fas fa-money-bill-wave"></i>
                    <span class="nav-text">Payroll</span>
                </a>
            </li>

            <li>
                <a href="#" class="nav-link">
                    <i class="fas fa-bullhorn"></i>
                    <span class="nav-text">Announcements</span>
                </a>
            </li>

        </ul>
    </nav>

    <!-- CLEAN FOOTER -->
    <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i>
            <span class="nav-text">Logout</span>
        </button>
    </div>

</aside>

        <div class="main-content" id="mainContent">

            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="mobile-toggle" id="mobileToggleBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="page-title">Employee Profile</div>
                </div>

                <div class="header-right">

                    <!-- Notification -->
                    <div class="notification-bell">
                        <button class="icon-btn" id="notificationBtn">
                            <i class="far fa-bell"></i>
                            <span class="notification-badge">3</span>
                        </button>
                    </div>

                    <!-- User Profile -->
                    <div class="user-profile">
                        <button class="profile-btn" id="profileDropdownBtn">

                            <div class="avatar" id="userAvatar">AM</div>

                            <div class="user-info">
                                <div class="user-name" id="userName">Alex Mercer</div>
                                <div class="user-role" id="userRole">Senior Developer</div>
                            </div>

                            <i class="fas fa-chevron-down dropdown-arrow"></i>
                        </button>

                        <!-- Dropdown -->
                        <div class="profile-dropdown" id="profileDropdown">

                            <a href="#" class="dropdown-item">
                                <i class="fas fa-user-circle"></i>
                                <span>My Profile</span>
                            </a>

                            <div class="dropdown-divider"></div>

                            <button class="dropdown-item logout-item">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>Logout</span>
                            </button>

                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="stepper-container">
                    <div class="stepper" id="stepper"></div>
                </div>
                <div class="profile-content-card">
                    <div class="profile-header">
                        <h2>
                            <i class="fas fa-id-card"></i>
                            <span id="stepTitle">Personal Information</span>
                        </h2>
                        <div class="btn-wrapper">
                            <button class="btn-edit" id="editModeBtn">
                                <i class="fas fa-pen"></i> Edit
                            </button>

                            <button class="btn-save" id="saveModeBtn" style="display: none">
                                <i class="fas fa-save"></i> Save
                            </button>

                            <button class="btn-cancel" id="cancelModeBtn" style="display: none">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </div>
                    </div>
                    <div id="stepContainer"></div>
                    <div class="step-navigation">
                        <button class="btn-nav btn-prev" id="prevBtn">
                            <i class="fas fa-chevron-left"></i> Previous</button><button class="btn-nav btn-next"
                            id="nextBtn">
                            Next <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">Add Record</h3>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn-cancel-modal" id="cancelModalBtn" style="padding: 10px 20px; border-radius: 40px">
                    Cancel</button><button class="btn-save-modal" id="saveModalBtn" style="
              padding: 10px 20px;
              border-radius: 40px;
              background: var(--primary);
              color: white;
              border: none;
            ">
                    Save
                </button>
            </div>
        </div>
    </div>

    <script src="../js/profile.js"></script>
</body>

</html>
