<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Employee Dashboard</title>
    
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .profile-avatar {
            position: relative;
        }
        
        .profile-avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .change-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-info h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .profile-info .role {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .profile-details {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow-sm);
        }
        
        .detail-section {
            margin-bottom: 30px;
        }
        
        .detail-section h3 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .detail-item label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .detail-item .value {
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .edit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="main-content">
            <div class="content-wrapper">
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <img src="../assets/icons/avatar-placeholder.svg" alt="Profile" id="profileAvatar">
                            <button class="change-avatar-btn" onclick="changeAvatar()">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M16 3L17 4L4 17L3 16L16 3Z"/>
                                    <path d="M14 3L17 6L15 8L12 5L14 3Z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="profile-info">
                            <h2 id="profileName">John Doe</h2>
                            <div class="role" id="profileRole">Senior Developer</div>
                            <div class="department" id="profileDepartment">Engineering Department</div>
                        </div>
                    </div>
                    
                    <div class="profile-details">
                        <div class="detail-section">
                            <h3>Personal Information</h3>
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <label>Full Name</label>
                                    <div class="value" id="fullName">John Doe</div>
                                </div>
                                <div class="detail-item">
                                    <label>Email</label>
                                    <div class="value" id="email">john.doe@company.com</div>
                                </div>
                                <div class="detail-item">
                                    <label>Phone</label>
                                    <div class="value" id="phone">+1 (555) 123-4567</div>
                                </div>
                                <div class="detail-item">
                                    <label>Date of Birth</label>
                                    <div class="value" id="dob">March 15, 1990</div>
                                </div>
                                <div class="detail-item">
                                    <label>Address</label>
                                    <div class="value" id="address">123 Main St, New York, NY 10001</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="detail-section">
                            <h3>Employment Information</h3>
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <label>Employee ID</label>
                                    <div class="value" id="employeeId">EMP-2022-001</div>
                                </div>
                                <div class="detail-item">
                                    <label>Department</label>
                                    <div class="value" id="department">Engineering</div>
                                </div>
                                <div class="detail-item">
                                    <label>Position</label>
                                    <div class="value" id="position">Senior Developer</div>
                                </div>
                                <div class="detail-item">
                                    <label>Join Date</label>
                                    <div class="value" id="joinDate">January 15, 2022</div>
                                </div>
                                <div class="detail-item">
                                    <label>Manager</label>
                                    <div class="value" id="manager">Sarah Johnson</div>
                                </div>
                                <div class="detail-item">
                                    <label>Employment Type</label>
                                    <div class="value" id="employmentType">Full-time</div>
                                </div>
                            </div>
                        </div>
                        
                        <button class="edit-btn" onclick="editProfile()">Edit Profile</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/mockData.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/header.js"></script>
    
    <script>
        window.addEventListener('dashboard-ready', () => {
            loadProfileData();
        });
        
        function loadProfileData() {
            const user = MockData.user;
            
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileRole').textContent = user.role;
            document.getElementById('profileDepartment').textContent = `${user.department} Department`;
            document.getElementById('fullName').textContent = user.name;
            document.getElementById('email').textContent = user.email;
            document.getElementById('phone').textContent = user.phone;
            document.getElementById('address').textContent = user.address;
            document.getElementById('department').textContent = user.department;
            document.getElementById('position').textContent = user.role;
            document.getElementById('joinDate').textContent = new Date(user.joinDate).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
            
            if (user.avatar) {
                document.getElementById('profileAvatar').src = user.avatar;
            }
        }
        
        function editProfile() {
            window.dashboardManager?.showSuccess('Profile editing feature coming soon!');
        }
        
        function changeAvatar() {
            window.dashboardManager?.showSuccess('Avatar change feature coming soon!');
        }
    </script>
</body>
</html>
